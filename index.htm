<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Air Hockey Pro</title>
    <meta name="description" content="A fast-paced neon air hockey game. Choose your difficulty and race to 7!">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel='stylesheet'
        href='https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap'>
    <link rel='stylesheet' href='https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css'>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="game-wrap">
        <div id="outer">
            <!-- Player stats panel -->
            <div id="stat-left" class="stat-panel">
                <div class="stat-name" style="color:#00d4ff">YOU</div>
                <div class="stat-score" id="score-p" style="color:#00d4ff;text-shadow:0 0 20px #00d4ff">0</div>
                <div class="stat-divider"></div>
                <div class="stat-row"><span class="stat-label">STREAK</span><span class="stat-val" id="stat-p-streak">0</span></div>
                <div class="stat-row"><span class="stat-label">TOP SPEED</span><span class="stat-val" id="stat-p-speed">0</span></div>
                <div class="stat-row"><span class="stat-label">POWER HITS</span><span class="stat-val" id="stat-p-power">0</span></div>
                <div class="stat-divider"></div>
                <div class="stat-footer">FIRST TO 7 WINS</div>
            </div>

            <!-- Game arena -->
            <div id="arena">
                <canvas id="c"></canvas>
                <div id="mute-btn"></div>
                <div id="ui"></div>

                <!-- Difficulty / Ready Screen -->
                <div id="ready-screen" class="screen">
                    <div class="ready-inner">
                        <div class="ready-logo">AIR<span>HOCKEY</span></div>
                        <div class="ready-sub">SELECT DIFFICULTY</div>
                        <div class="difficulty-select">
                            <button id="btn-easy" class="btn-diff active" onclick="setDiff('easy', this)">
                                <span class="diff-icon">🟢</span>
                                <span class="diff-label">EASY</span>
                                <span class="diff-desc">Slow &amp; forgiving</span>
                            </button>
                            <button id="btn-medium" class="btn-diff" onclick="setDiff('medium', this)">
                                <span class="diff-icon">🟡</span>
                                <span class="diff-label">MEDIUM</span>
                                <span class="diff-desc">Balanced challenge</span>
                            </button>
                            <button id="btn-hard" class="btn-diff" onclick="setDiff('hard', this)">
                                <span class="diff-icon">🔴</span>
                                <span class="diff-label">HARD</span>
                                <span class="diff-desc">No mercy</span>
                            </button>
                        </div>
                        <button id="btn-start" onclick="startGame()">▶ START GAME</button>
                        <div class="ready-keys">MOVE MOUSE TO CONTROL · S FOR SOUND</div>
                    </div>
                </div>

                <!-- Game Over Screen -->
                <div id="gameover-screen" class="screen">
                    <div class="go-inner">
                        <div class="go-face" id="go-face">😄</div>
                        <div class="go-who" id="go-who">YOU WIN</div>
                        <div class="go-wins" id="go-wins">GAME · SET · MATCH</div>
                        <div class="go-final" id="go-final">7 – 3</div>
                        <button id="btn-again">PLAY AGAIN</button>
                    </div>
                </div>
            </div>

            <!-- CPU stats panel -->
            <div id="stat-right" class="stat-panel">
                <div class="stat-name" style="color:#ff2d55">CPU</div>
                <div class="stat-score" id="score-cpu" style="color:#ff2d55;text-shadow:0 0 20px #ff2d55">0</div>
                <div class="stat-divider"></div>
                <div class="stat-row"><span class="stat-label">STREAK</span><span class="stat-val" id="stat-cpu-streak">0</span></div>
                <div class="stat-row"><span class="stat-label">TOP SPEED</span><span class="stat-val" id="stat-cpu-speed">0</span></div>
                <div class="stat-row"><span class="stat-label">POWER HITS</span><span class="stat-val" id="stat-cpu-power">0</span></div>
                <div class="stat-divider"></div>
                <div class="stat-footer" id="cpu-footer">PREPARE TO LOSE</div>
            </div>
        </div>
    </div>

    <script src="javascript.js"></script>
</body>

</html>
